name: Release

on:
  push:
    tags:
      - "v1.0.0-demo"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4

      - name: Test and build Android APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:testDebugUnitTest :app:assembleDebug

      - name: Test and package backend
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew test distZip

      - name: Verify backend container image
        run: docker build --tag weavetone-backend:${GITHUB_REF_NAME} ./backend

      - name: Collect release assets and checksums
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/debug/app-debug.apk release-assets/weavetone-${GITHUB_REF_NAME}-debug.apk
          cp backend/build/distributions/ai-music-backend.zip release-assets/weavetone-backend-${GITHUB_REF_NAME}.zip
          cd release-assets
          sha256sum *.apk *.zip > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --title "WeaveTone ${GITHUB_REF_NAME}" \
            --notes-file docs/RELEASE_NOTES_v1.0.0-demo.md \
            --verify-tag
