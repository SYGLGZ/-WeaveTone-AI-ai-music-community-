name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Run unit tests and build debug APK
        run: ./gradlew :app:testDebugUnitTest :app:assembleDebug

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Run backend tests
        run: ./gradlew test

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and start the full backend stack
        run: docker compose up --build --detach --wait
      - name: Verify readiness endpoint
        run: curl --fail --retry 5 --retry-delay 2 http://127.0.0.1:8080/ready
      - name: Show container logs on failure
        if: failure()
        run: docker compose logs
      - name: Stop stack
        if: always()
        run: docker compose down --volumes
